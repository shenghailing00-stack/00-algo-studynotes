name: Update Monthly Daily Index (Newest First)

on:
  push:
    branches: ["main"]

permissions:
  contents: write

jobs:
  update-index:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Update month index (newest first)
        shell: bash
        run: |
          set -e
          ROOT="daily"

          BEFORE="${{ github.event.before }}"
          AFTER="${{ github.sha }}"

          if [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
            RANGE="HEAD~1..HEAD"
          else
            RANGE="$BEFORE..$AFTER"
          fi

          CHANGED=$(git diff --name-only $RANGE || true)
          DAILY_FILES=$(echo "$CHANGED" | grep -E "^${ROOT}/[0-9]{4}/[0-9]{2}/[0-9]{4}-[0-9]{2}-[0-9]{2}\.md$" || true)

          if [ -z "$DAILY_FILES" ]; then
            echo "No daily files changed. Exit."
            exit 0
          fi

          for f in $DAILY_FILES; do
            YEAR=$(echo "$f" | awk -F'/' '{print $2}')
            MONTH=$(echo "$f" | awk -F'/' '{print $3}')
            DAYFILE=$(basename "$f")
            INDEX="${ROOT}/${YEAR}/${MONTH}/README.md"

            if [ ! -f "$INDEX" ]; then
              mkdir -p "${ROOT}/${YEAR}/${MONTH}"
              echo "# ${YEAR}-${MONTH} Daily Logs" > "$INDEX"
              echo "" >> "$INDEX"
            fi

            LINK="- [${DAYFILE%.md}](${DAYFILE})"

            if grep -q "(${DAYFILE})" "$INDEX"; then
              continue
            fi

            # ensure blank line after title
            LINE2=$(sed -n '2p' "$INDEX" || true)
            if [ -n "$LINE2" ]; then
              tmp=$(mktemp)
              awk 'NR==1{print; print ""; next} {print}' "$INDEX" > "$tmp"
              mv "$tmp" "$INDEX"
            fi

            # insert at line 3 (newest first)
            tmp=$(mktemp)
            awk -v link="$LINK" 'NR==1{print; next} NR==2{print; print link; next} {print}' "$INDEX" > "$tmp"
            mv "$tmp" "$INDEX"
            # ---- update daily/README.md (master month index) ----
MASTER_INDEX="${ROOT}/README.md"

# ensure master index exists
if [ ! -f "$MASTER_INDEX" ]; then
  echo "# Daily Logs" > "$MASTER_INDEX"
  echo "" >> "$MASTER_INDEX"
fi

MONTH_HEADER="## ${YEAR}-${MONTH}"
MONTH_LINK="- [${YEAR}-${MONTH}](${YEAR}/${MONTH}/README.md)"

# 如果没有这个月份标题：插到文件最上面（标题下面）
if ! grep -Fqx "$MONTH_HEADER" "$MASTER_INDEX"; then
  tmp2=$(mktemp)
  awk -v h="$MONTH_HEADER" -v l="$MONTH_LINK" '
    NR==1 {print; print ""; print h; print l; print ""; next}
    {print}
  ' "$MASTER_INDEX" > "$tmp2"
  mv "$tmp2" "$MASTER_INDEX"
else
  # 有标题但没有链接：把链接插到标题下一行
  if ! grep -Fq "${YEAR}/${MONTH}/README.md" "$MASTER_INDEX"; then
    tmp2=$(mktemp)
    awk -v h="$MONTH_HEADER" -v l="$MONTH_LINK" '
      $0==h {print; print l; next}
      {print}
    ' "$MASTER_INDEX" > "$tmp2"
    mv "$tmp2" "$MASTER_INDEX"
  fi
fi
# ---- end ----
          done

      - name: Commit changes (if any)
        shell: bash
        run: |
          set -e
          if git status --porcelain | grep -q .; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add .
            git commit -m "chore: auto-update monthly daily index"
            git push
          else
            echo "No changes to commit."
          fi
