name: Update Monthly Daily Index

on:
  push:
    branches: ["main"]

permissions:
  contents: write

jobs:
  update-index:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Update month index for daily logs
        shell: bash
        run: |
          set -e

          ROOT="daily"

          # 找出本次 push 中新增/修改的日记文件（排除 README.md）
          CHANGED=$(git diff --name-only HEAD~1 HEAD || true)

          # 过滤出形如：daily/YYYY/MM/YYYY-MM-DD.md
          DAILY_FILES=$(echo "$CHANGED" | grep -E "^${ROOT}/[0-9]{4}/[0-9]{2}/[0-9]{4}-[0-9]{2}-[0-9]{2}\.md$" || true)

          if [ -z "$DAILY_FILES" ]; then
            echo "No daily files changed. Exit."
            exit 0
          fi

          for f in $DAILY_FILES; do
            YEAR=$(echo "$f" | awk -F'/' '{print $2}')
            MONTH=$(echo "$f" | awk -F'/' '{print $3}')
            DAYFILE=$(basename "$f")

            INDEX="${ROOT}/${YEAR}/${MONTH}/README.md"

            # 如果当月索引不存在就创建
            if [ ! -f "$INDEX" ]; then
              mkdir -p "${ROOT}/${YEAR}/${MONTH}"
              echo "# ${YEAR}-${MONTH} Daily Logs" > "$INDEX"
              echo "" >> "$INDEX"
            fi

            # 若不存在该日记链接则追加
            if ! grep -q "(${DAYFILE})" "$INDEX"; then
              echo "- [${DAYFILE%.md}](${DAYFILE})" >> "$INDEX"
              echo "Updated index: $INDEX + $DAYFILE"
            else
              echo "Index already contains: $DAYFILE"
            fi
          done

      - name: Commit changes (if any)
        shell: bash
        run: |
          set -e
          if git status --porcelain | grep -q .; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add .
            git commit -m "chore: auto-update monthly daily index"
            git push
          else
            echo "No changes to commit."
          fi
